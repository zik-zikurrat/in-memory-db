engine:
  type: "in_memory"
  network:
    address: "127.0.0.1:3223"
    max_connections: 100
    max_message_size: 4096 #4KB
    idle_timeout: 5m
  logging:
    level: "info"
    # output: "./log/output.log"
    output: "stdout"
  wal:
    flushing_batch_size: 100
    flushing_batch_timeout: "10ms"
    max_segment_size: 10485760 #10MB
    data_directory: "./data/spider/wal"
